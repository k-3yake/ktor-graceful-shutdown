apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktor-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ktor-app
  template:
    metadata:
      labels:
        app: ktor-app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ktor-app
          image: ktor-graceful-shutdown:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
